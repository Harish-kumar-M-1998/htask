# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting GitHub, use: New → Blueprint → select this repo

services:
  # ─── API (Node / Docker) ───────────────────────────────────────────────────
  - type: web
    name: htask-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.api
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: htask-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: htask-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_PATH
        value: ./uploads
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: EMAIL_SCHEDULER_ENABLED
        value: true
      - key: GRAYLOG_ENABLED
        value: false

  # ─── Web (Static SPA) ────────────────────────────────────────────────────────
  - type: web
    name: htask-web
    runtime: static
    buildCommand: npm ci && npm run build --workspace=@htask/shared && npm run build --workspace=@htask/web
    staticPublishPath: apps/web/dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  # ─── Redis (search cache, optional but recommended) ────────────────────────
  - type: keyvalue
    name: htask-redis
    plan: free
    ipAllowList: []

databases:
  - name: htask-db
    plan: free
    databaseName: htask
    user: htask
