name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: htask
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: htask
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U htask"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://htask:ci_test_password@localhost:5432/htask?schema=public
      JWT_SECRET: ci-jwt-secret-min-16-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-min-16-chars
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=@htask/api

      - name: Run database migrations
        run: npm run db:migrate:prod --workspace=@htask/api

      - name: Build all workspaces
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test --if-present
